<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mgh Pulse Lab</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#020617;
}

header img {
    height:50px;
}

nav a {
    color:#94a3b8;
    margin:0 15px;
    text-decoration:none;
}

.hero {
    text-align:center;
    padding:100px 20px;
}

.hero h1 {
    font-size:50px;
}

.hero p {
    color:#94a3b8;
}

.section {
    padding:60px;
}

.cards {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card {
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    width:300px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-5px);
}

footer {
    text-align:center;
    padding:20px;
    background:#020617;
}
</style>
</head>

<body>

<header>
    <img src="logo.png">
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Cours</a>
        <a href="#">PDF</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Mgh Pulse Lab ⚡</h1>
    <p>Plateforme scientifique sur les énergies renouvelables</p>
</section>

<section class="section">
    <h2>📚 Mes contenus</h2>
    <div class="cards">

        <div class="card">
            <h3>📄 Cours</h3>
            <p>Résumés et explications simples</p>
        </div>

        <div class="card">
            <h3>📘 PDF</h3>
            <p>Télécharger mes documents</p>
        </div>

        <div class="card">
            <h3>🛠️ Projets</h3>
            <p>Arduino, IoT, systèmes énergétiques</p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Mgh Pulse Lab</p>
</footer>

</body>
</html>
